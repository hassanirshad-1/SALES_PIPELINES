<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>App Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a1a2e;
            --primary-light: #2d2d4a;
            --primary-dark: #0f0f1a;
            --accent: #e6a756;
            --accent-light: #f0c080;
            --bg: #f8f7f4;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --border: #f0f0f2;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.10);
            --radius: 16px;
            --radius-lg: 24px;
            --nav-height: 80px;
            --status-height: 54px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #111; color: var(--text);
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }
        button { font-family: inherit; cursor: pointer; border: none; background: none; }
        input { font-family: inherit; border: none; outline: none; }
        img { display: block; max-width: 100%; }
        #device-frame {
            width: 100%; height: 100%;
            position: relative; overflow: hidden;
            background: var(--bg);
        }
        @media (min-width: 481px) {
            body { display: flex; align-items: center; justify-content: center; }
            #device-frame {
                width: 390px; height: 844px;
                border-radius: 55px; border: 8px solid #1a1a1a;
                box-shadow: 0 0 0 2px #333, 0 20px 60px rgba(0,0,0,0.5), inset 0 0 0 2px #222;
                position: relative;
            }
            #device-frame::before {
                content: ''; position: absolute; top: 0; left: 50%;
                transform: translateX(-50%); width: 126px; height: 35px;
                background: #1a1a1a; border-radius: 0 0 20px 20px; z-index: 100;
            }
            .desktop-label {
                position: fixed; bottom: 24px; left: 50%;
                transform: translateX(-50%); color: #555;
                font-size: 13px; font-weight: 500; letter-spacing: 0.5px;
            }
        }
        @media (max-width: 480px) { .desktop-label { display: none; } }
        .status-bar {
            position: absolute; top: 0; left: 0; right: 0;
            height: var(--status-height); z-index: 90;
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 0 28px 6px; font-size: 14px; font-weight: 600;
            color: var(--text);
        }
        .status-bar.light { color: #fff; }
        .status-bar-icons { display: flex; align-items: center; gap: 5px; font-size: 13px; }
        #splash {
            position: absolute; inset: 0; z-index: 200;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: linear-gradient(160deg, var(--primary) 0%, var(--primary-dark) 100%);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        #splash::before {
            content: ''; position: absolute; width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            border-radius: 50%; top: 15%; right: -15%; animation: floatBubble 4s ease-in-out infinite;
        }
        #splash::after {
            content: ''; position: absolute; width: 180px; height: 180px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            border-radius: 50%; bottom: 20%; left: -10%; animation: floatBubble 5s ease-in-out infinite reverse;
        }
        @keyframes floatBubble { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }
        #splash.hidden { opacity: 0; transform: scale(1.08); pointer-events: none; }
        .splash-icon { width: 90px; height: 90px; margin-bottom: 24px; color: var(--accent); animation: splashPulse 2s ease-in-out infinite; position: relative; z-index: 1; }
        @keyframes splashPulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.06);opacity:0.9} }
        .splash-brand {
            font-family: 'Playfair Display', serif; font-size: 34px;
            font-weight: 700; color: #fff; letter-spacing: 1.5px; text-align: center;
            margin-bottom: 10px; position: relative; z-index: 1;
        }
        .splash-tagline {
            font-size: 11px; font-weight: 600; letter-spacing: 5px;
            color: var(--accent); text-transform: uppercase; position: relative; z-index: 1;
        }
        .splash-loader {
            margin-top: 48px; width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite; position: relative; z-index: 1;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .screen-container {
            position: absolute; top: 0; left: 0; right: 0;
            bottom: var(--nav-height); overflow: hidden;
        }
        .screen {
            position: absolute; inset: 0;
            opacity: 0; transform: translateX(30px);
            pointer-events: none; transition: opacity 0.35s ease, transform 0.35s ease;
            overflow-y: auto; overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        .screen::-webkit-scrollbar { display: none; }
        .screen.active { opacity: 1; transform: none; pointer-events: auto; }
        .screen-pad { padding: calc(var(--status-height) + 8px) 20px 24px; }
        .bottom-nav {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: calc(var(--nav-height) + var(--safe-bottom));
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0,0,0,0.06); z-index: 80;
            display: flex; align-items: flex-start; justify-content: space-around;
            padding-top: 10px; padding-bottom: var(--safe-bottom);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            font-size: 10px; font-weight: 600; color: var(--text-muted);
            transition: color 0.25s, transform 0.2s; position: relative; min-width: 56px;
        }
        .nav-item:active { transform: scale(0.9); }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 21px; transition: transform 0.25s; }
        .nav-item.active i { transform: scale(1.15); }
        .nav-badge {
            position: absolute; top: -5px; right: 6px;
            min-width: 18px; height: 18px; padding: 0 5px;
            background: #ef4444; color: #fff; font-size: 10px; font-weight: 700;
            border-radius: 9px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 6px rgba(239,68,68,0.4);
        }
        /* ========== HOME SCREEN ========== */
        .home-hero {
            background: linear-gradient(160deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: calc(var(--status-height) + 16px) 24px 32px;
            border-radius: 0 0 28px 28px;
            color: #fff; position: relative; overflow: hidden;
        }
        .home-hero::before {
            content: ''; position: absolute; top: -40px; right: -40px;
            width: 180px; height: 180px; background: rgba(255,255,255,0.06);
            border-radius: 50%;
        }
        .home-hero::after {
            content: ''; position: absolute; bottom: -20px; left: -20px;
            width: 100px; height: 100px; background: rgba(255,255,255,0.04);
            border-radius: 50%;
        }
        .hero-greeting { font-size: 14px; opacity: 0.85; margin-bottom: 6px; font-weight: 500; }
        .hero-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
        .hero-subtitle { font-size: 13px; opacity: 0.75; margin-top: 8px; }
        .promo-banner {
            margin: 20px; padding: 16px 20px; border-radius: var(--radius);
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border: 1px solid #fcd34d;
            display: flex; align-items: center; gap: 14px;
        }
        .promo-icon {
            width: 44px; height: 44px; border-radius: 12px;
            background: #f59e0b; color: #fff; display: flex;
            align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
        }
        .promo-text h4 { font-size: 13px; font-weight: 700; color: #92400e; }
        .promo-text p { font-size: 11px; color: #a16207; margin-top: 2px; }
        .quick-actions {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 12px; padding: 20px 20px 0;
            margin-top: -20px; position: relative; z-index: 10;
        }
        .quick-action {
            background: var(--card); border-radius: var(--radius);
            padding: 16px 8px; text-align: center;
            box-shadow: var(--shadow); transition: transform 0.2s;
        }
        .quick-action:active { transform: scale(0.95); }
        .quick-action-icon {
            width: 42px; height: 42px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 8px; font-size: 18px; color: var(--primary);
            background: color-mix(in srgb, var(--primary) 10%, transparent);
        }
        .quick-action span { font-size: 11px; font-weight: 600; color: var(--text); }
        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 24px 20px 12px;
        }
        .section-title { font-size: 18px; font-weight: 700; }
        .section-link { font-size: 13px; font-weight: 600; color: var(--primary); }
        /* Stylists Carousel */
        .stylists-scroll {
            display: flex; gap: 14px; padding: 0 20px 4px;
            overflow-x: auto; scroll-snap-type: x mandatory;
        }
        .stylists-scroll::-webkit-scrollbar { display: none; }
        .stylist-card {
            flex: 0 0 120px; scroll-snap-align: start;
            background: var(--card); border-radius: var(--radius);
            overflow: hidden; box-shadow: var(--shadow);
            text-align: center; padding: 16px 10px;
            transition: transform 0.2s;
        }
        .stylist-card:active { transform: scale(0.96); }
        .stylist-avatar {
            width: 56px; height: 56px; border-radius: 50%;
            margin: 0 auto 10px; display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 700; color: #fff;
        }
        .stylist-card h4 { font-size: 12px; font-weight: 700; }
        .stylist-card p { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
        .stylist-rating { font-size: 10px; color: var(--accent); margin-top: 4px; font-weight: 600; }
        /* Store Card */
        .store-card {
            margin: 0 20px; background: var(--card); border-radius: var(--radius);
            padding: 16px; box-shadow: var(--shadow);
            display: flex; align-items: center; gap: 14px;
        }
        .store-card-icon {
            width: 48px; height: 48px; border-radius: 14px;
            background: color-mix(in srgb, var(--primary) 10%, transparent);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: var(--primary); flex-shrink: 0;
        }
        .store-card-info { flex: 1; }
        .store-card-info h4 { font-size: 14px; font-weight: 700; }
        .store-card-info p { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .store-open-badge {
            font-size: 11px; font-weight: 700; padding: 4px 10px;
            border-radius: 8px; background: #dcfce7; color: #16a34a;
        }
        .loyalty-banner {
            margin: 20px; padding: 18px 20px; border-radius: var(--radius);
            background: linear-gradient(135deg, var(--accent) 0%, #b8944e 100%);
            color: #fff; display: flex; align-items: center; gap: 14px;
        }
        .loyalty-banner i { font-size: 28px; }
        .loyalty-banner h4 { font-size: 14px; font-weight: 700; }
        .loyalty-banner p { font-size: 11px; opacity: 0.9; margin-top: 2px; }
        /* ========== SERVICES SCREEN ========== */
        .menu-header {
            padding: calc(var(--status-height) + 8px) 20px 0;
            background: var(--card);
        }
        .menu-header h2 { font-size: 28px; font-weight: 800; }
        .menu-header .menu-loc {
            font-size: 12px; color: var(--primary); font-weight: 600; margin-top: 2px;
        }
        .menu-search {
            margin: 14px 20px 0; padding: 12px 16px;
            background: var(--bg); border-radius: 12px;
            display: flex; align-items: center; gap: 10px;
            color: var(--text-muted); font-size: 14px;
        }
        .menu-search input {
            flex: 1; background: transparent; font-size: 14px; color: var(--text);
        }
        .menu-search input::placeholder { color: var(--text-muted); }
        .category-pills {
            display: flex; gap: 8px; padding: 16px 20px;
            overflow-x: auto; background: var(--card);
            border-bottom: 1px solid var(--border);
        }
        .category-pills::-webkit-scrollbar { display: none; }
        .cat-pill {
            padding: 8px 18px; border-radius: 20px;
            font-size: 13px; font-weight: 600; white-space: nowrap;
            background: var(--bg); color: var(--text-secondary);
            transition: all 0.2s;
        }
        .cat-pill.active { background: var(--primary); color: #fff; }
        .menu-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 14px; padding: 16px 20px 100px;
        }
        .menu-item {
            background: var(--card); border-radius: var(--radius);
            overflow: hidden; box-shadow: var(--shadow);
            transition: transform 0.2s;
        }
        .menu-item:active { transform: scale(0.96); }
        .menu-item-img {
            height: 120px; display: flex; align-items: center; justify-content: center;
            font-size: 40px; position: relative;
        }
        .menu-item-img .popular-tag {
            position: absolute; top: 8px; right: 8px;
            background: var(--primary); color: #fff;
            font-size: 9px; font-weight: 700; padding: 3px 7px;
            border-radius: 6px;
        }
        .menu-item-info { padding: 12px; }
        .menu-item-info h4 { font-size: 14px; font-weight: 700; }
        .menu-item-info .item-cal {
            font-size: 11px; color: var(--text-muted); margin-top: 2px;
        }
        .menu-item-bottom {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 10px;
        }
        .menu-item-price { font-size: 15px; font-weight: 800; color: var(--primary); }
        .add-btn {
            width: 32px; height: 32px; border-radius: 10px;
            background: var(--primary); color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; transition: transform 0.15s, background 0.2s;
        }
        .add-btn:active { transform: scale(0.85); }
        /* ========== BOOKING MODAL ========== */
        .modal-overlay {
            position: absolute; inset: 0; z-index: 150;
            background: rgba(0,0,0,0.5); opacity: 0;
            pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-sheet {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: var(--card); border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            max-height: 85%; overflow-y: auto; padding: 8px 20px 30px;
            transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
        }
        .modal-overlay.show .modal-sheet { transform: translateY(0); }
        .modal-handle {
            width: 40px; height: 4px; background: #ddd;
            border-radius: 2px; margin: 8px auto 16px;
        }
        .modal-product-img {
            height: 160px; border-radius: var(--radius);
            display: flex; align-items: center; justify-content: center;
            font-size: 60px; margin-bottom: 16px;
        }
        .modal-product-name { font-size: 22px; font-weight: 800; }
        .modal-product-desc { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        .size-selector { display: flex; gap: 10px; margin-top: 20px; }
        .size-btn {
            flex: 1; padding: 12px; border-radius: 12px; text-align: center;
            border: 2px solid var(--border); font-weight: 600; font-size: 13px;
            transition: all 0.2s; color: var(--text);
        }
        .size-btn.active {
            border-color: var(--primary); background: color-mix(in srgb, var(--primary) 8%, transparent);
            color: var(--primary);
        }
        .size-btn small { display: block; font-size: 11px; color: var(--text-muted); font-weight: 500; margin-top: 2px; }
        .extras-label { font-size: 15px; font-weight: 700; margin: 20px 0 10px; }
        .extras-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .extra-chip {
            padding: 8px 14px; border-radius: 20px;
            border: 1.5px solid var(--border); font-size: 12px; font-weight: 600;
            transition: all 0.2s; color: var(--text-secondary);
            display: flex; align-items: center; gap: 6px;
        }
        .extra-chip.active {
            border-color: var(--primary); background: color-mix(in srgb, var(--primary) 8%, transparent);
            color: var(--primary);
        }
        .modal-add-btn {
            width: 100%; padding: 16px; margin-top: 20px;
            background: var(--primary); color: #fff;
            border-radius: 14px; font-size: 16px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: transform 0.15s, opacity 0.2s;
        }
        .modal-add-btn:active { transform: scale(0.97); }
        /* ========== CART SCREEN ========== */
        .cart-empty {
            text-align: center; padding: 60px 20px;
            color: var(--text-muted);
        }
        .cart-empty i { font-size: 48px; margin-bottom: 16px; color: var(--border); }
        .cart-empty p { font-size: 15px; font-weight: 600; }
        .cart-empty span { font-size: 13px; }
        .cart-item {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 0; border-bottom: 1px solid var(--border);
        }
        .cart-item-img {
            width: 56px; height: 56px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; flex-shrink: 0;
        }
        .cart-item-info { flex: 1; }
        .cart-item-info h4 { font-size: 14px; font-weight: 700; }
        .cart-item-info p { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
        .cart-item-right { text-align: right; }
        .cart-item-price { font-size: 15px; font-weight: 700; }
        .cart-item-qty { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
        .cart-qty-btn {
            width: 26px; height: 26px; border-radius: 8px;
            border: 1px solid var(--border); display: flex;
            align-items: center; justify-content: center;
            font-size: 12px; color: var(--text-secondary);
        }
        .order-type-toggle {
            display: flex; background: var(--bg); border-radius: 12px;
            padding: 4px; margin: 20px 0;
        }
        .order-type-btn {
            flex: 1; padding: 10px; border-radius: 10px;
            font-size: 13px; font-weight: 600; text-align: center;
            transition: all 0.2s; color: var(--text-secondary);
        }
        .order-type-btn.active {
            background: var(--card); color: var(--text);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .order-summary {
            background: var(--bg); border-radius: var(--radius);
            padding: 16px; margin-top: 16px;
        }
        .summary-row {
            display: flex; justify-content: space-between;
            font-size: 14px; padding: 6px 0;
        }
        .summary-row.total {
            border-top: 1.5px solid var(--border);
            margin-top: 8px; padding-top: 12px;
            font-size: 17px; font-weight: 800;
        }
        .apple-pay-btn {
            width: 100%; padding: 16px; margin-top: 20px;
            background: #000; color: #fff; border-radius: 14px;
            font-size: 16px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .place-order-btn {
            width: 100%; padding: 16px; margin-top: 10px;
            background: var(--primary); color: #fff; border-radius: 14px;
            font-size: 16px; font-weight: 700;
            transition: transform 0.15s;
        }
        .place-order-btn:active { transform: scale(0.97); }
        /* ========== ACCOUNT SCREEN ========== */
        .profile-card {
            background: var(--card); border-radius: var(--radius-lg);
            padding: 24px; text-align: center; box-shadow: var(--shadow);
            margin-bottom: 20px;
        }
        .profile-avatar {
            width: 72px; height: 72px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff; font-size: 26px; font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .profile-name { font-size: 20px; font-weight: 800; }
        .profile-role { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
        .rewards-card {
            background: linear-gradient(160deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: var(--radius-lg); padding: 24px; color: #fff;
            margin-bottom: 20px; position: relative; overflow: hidden;
        }
        .rewards-card::after {
            content: ''; position: absolute; top: -20px; right: -20px;
            width: 120px; height: 120px; background: rgba(255,255,255,0.06);
            border-radius: 50%;
        }
        .rewards-label { font-size: 13px; opacity: 0.8; }
        .rewards-points { font-size: 42px; font-weight: 900; margin: 4px 0; }
        .rewards-unit { font-size: 16px; font-weight: 500; opacity: 0.7; }
        .rewards-progress-wrap {
            margin-top: 16px; background: rgba(255,255,255,0.15);
            border-radius: 6px; height: 8px; overflow: hidden;
        }
        .rewards-progress-bar {
            height: 100%; background: var(--accent); border-radius: 6px;
            transition: width 0.6s ease;
        }
        .rewards-next {
            display: flex; justify-content: space-between;
            font-size: 12px; margin-top: 8px; opacity: 0.8;
        }
        .settings-group { background: var(--card); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; box-shadow: var(--shadow); }
        .settings-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 18px; border-bottom: 1px solid var(--border);
        }
        .settings-item:last-child { border: none; }
        .settings-item-left { display: flex; align-items: center; gap: 12px; }
        .settings-icon {
            width: 34px; height: 34px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
        }
        .settings-item-left span { font-size: 14px; font-weight: 600; }
        .sign-out-btn {
            width: 100%; padding: 14px; background: var(--bg);
            border-radius: var(--radius); font-size: 15px; font-weight: 700;
            color: #ef4444; margin-bottom: 20px;
        }
        /* ========== BOOKING SUCCESS ========== */
        .order-success {
            position: absolute; inset: 0; z-index: 160;
            background: var(--card); display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            padding: 40px; opacity: 0; pointer-events: none;
            transition: opacity 0.4s;
        }
        .order-success.show { opacity: 1; pointer-events: auto; }
        .success-check {
            width: 80px; height: 80px; border-radius: 50%;
            background: #dcfce7; color: #16a34a; font-size: 36px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
        .success-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        .success-sub { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }
        .success-btn {
            margin-top: 30px; padding: 14px 40px; background: var(--primary);
            color: #fff; border-radius: 14px; font-size: 15px; font-weight: 700;
        }
        @keyframes cartBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        .cart-bounce { animation: cartBounce 0.35s cubic-bezier(0.34,1.56,0.64,1); }
        .toast {
            position: absolute; top: 70px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px;
            border-radius: 12px; font-size: 13px; font-weight: 600;
            z-index: 300; opacity: 0; pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            backdrop-filter: blur(10px);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .add-btn.added { background: #16a34a !important; }
        .add-btn.added i::before { content: "\f00c"; }
    </style>
</head>

<script>
const C = APP_CONFIG;
let cart = [], currentScreen = 'home';
let modalExtras = [];

function init() {
    const r = document.documentElement.style;
    r.setProperty('--primary', C.primaryColor);
    r.setProperty('--primary-light', C.primaryLight);
    r.setProperty('--primary-dark', C.primaryDark);
    r.setProperty('--accent', C.accentColor);
    document.title = C.brandName + ' App';
    setText('splash-brand', C.brandName);
    setText('splash-tagline', C.brandTagline);
    setText('desktop-brand', C.brandName);
    var h = new Date().getHours();
    var g = h < 12 ? 'Good Morning' : h < 17 ? 'Good Afternoon' : 'Good Evening';
    setText('hero-greeting', g + ', ' + C.founderName + '! ✨');
    setText('hero-title', C.brandName);
    setText('hero-rating', C.googleRating + ' (' + C.reviewCount.toLocaleString() + ' reviews)');
    setText('loyalty-title', C.brandName + ' Rewards');
    setText('menu-store-name', C.brandName + ' ' + C.storeName);
    setText('cart-store-info', 'Appointments at ' + C.brandName + ' ' + C.storeName);
    document.getElementById('status-bar').classList.add('light');
    renderStylists(); renderStoreCard(); renderCategories(); renderMenu(); renderAccount(); renderCart();
    setTimeout(function(){ document.getElementById('splash').classList.add('hidden'); document.getElementById('status-bar').classList.remove('light'); }, 2200);
}
function setText(id, v) { var e = document.getElementById(id); if(e) e.textContent = v; }

function switchScreen(name) {
    if(name === currentScreen) return;
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
    document.getElementById('screen-' + name).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.toggle('active', n.dataset.screen === name); });
    document.getElementById('status-bar').classList.toggle('light', name === 'home');
    currentScreen = name;
    if(name === 'cart') renderCart();
}

function renderStylists() {
    var el = document.getElementById('stylists-scroll');
    if(!C.stylists) return;
    el.innerHTML = C.stylists.map(function(s){
        var initials = s.name.split(' ').map(function(w){ return w[0]; }).join('');
        return '<div class="stylist-card">' +
            '<div class="stylist-avatar" style="background:'+s.avatar+'">'+initials+'</div>' +
            '<h4>'+s.name+'</h4><p>'+s.specialty+'</p>' +
            '<p class="stylist-rating"><i class="fas fa-star"></i> '+s.rating+'</p></div>';
    }).join('');
}

function renderStoreCard() {
    document.getElementById('store-card').innerHTML =
        '<div class="store-card-icon"><i class="fas fa-store"></i></div>' +
        '<div class="store-card-info"><h4>'+C.brandName+' '+C.storeName+'</h4><p>'+C.storeAddress+'</p></div>' +
        '<span class="store-open-badge">Open Now</span>';
}

var activeCategory = 'All';
function renderCategories() {
    document.getElementById('category-pills').innerHTML = C.categories.map(function(cat){
        return '<button class="cat-pill '+(cat===activeCategory?'active':'')+'" onclick="filterCategory(\''+cat+'\')">'+cat+'</button>';
    }).join('');
}
function filterCategory(cat) { activeCategory = cat; renderCategories(); renderMenu(); }

function renderMenu(search) {
    var items = C.menuItems;
    if(activeCategory !== 'All') items = items.filter(function(i){ return i.category === activeCategory; });
    if(search) items = items.filter(function(i){ return i.name.toLowerCase().indexOf(search.toLowerCase()) >= 0; });
    document.getElementById('menu-grid').innerHTML = items.map(function(item){
        return '<div class="menu-item" onclick="openModal('+item.id+')">' +
            '<div class="menu-item-img" style="background:linear-gradient(145deg,'+item.gradient[0]+','+item.gradient[1]+')">' +
            '<i class="fas '+item.icon+'" style="color:rgba(255,255,255,0.85)"></i>' +
            (item.popular ? '<span class="popular-tag">Popular</span>' : '') + '</div>' +
            '<div class="menu-item-info"><h4>'+item.name+'</h4><p class="item-cal"><i class="fas fa-clock" style="font-size:10px"></i> '+item.duration+'</p>' +
            '<div class="menu-item-bottom"><span class="menu-item-price">'+C.currencySymbol+item.price.toFixed(2)+'</span>' +
            '<button class="add-btn" onclick="event.stopPropagation();quickAdd('+item.id+',event)"><i class="fas fa-plus"></i></button>' +
            '</div></div></div>';
    }).join('');
}

function openModal(id) {
    var item = C.menuItems.find(function(i){ return i.id === id; });
    if(!item) return;
    modalExtras = [];
    var html = '<div class="modal-product-img" style="background:linear-gradient(145deg,'+item.gradient[0]+','+item.gradient[1]+')">' +
        '<i class="fas '+item.icon+'" style="color:rgba(255,255,255,0.9)"></i></div>' +
        '<h3 class="modal-product-name">'+item.name+'</h3>' +
        '<p class="modal-product-desc"><i class="fas fa-clock"></i> '+item.duration+' · '+item.category+'</p>';
    if(C.addOns && C.addOns.length) {
        html += '<p class="extras-label">Add-Ons</p><div class="extras-grid">';
        C.addOns.forEach(function(ex,i){
            html += '<button class="extra-chip" onclick="toggleExtra('+i+',this)"><i class="fas '+ex.icon+'"></i>'+ex.name+
                (ex.price ? ' +'+C.currencySymbol+ex.price.toFixed(2) : '')+'</button>';
        });
        html += '</div>';
    }
    html += '<button class="modal-add-btn" data-item="'+item.id+'" onclick="addFromModal('+item.id+')">' +
        'Book Now — '+C.currencySymbol+item.price.toFixed(2)+'</button>';
    document.getElementById('modal-content').innerHTML = html;
    document.getElementById('product-modal').classList.add('show');
}
function closeModal() { document.getElementById('product-modal').classList.remove('show'); }

function toggleExtra(idx, btn) {
    var i = modalExtras.indexOf(idx);
    if(i >= 0){ modalExtras.splice(i,1); btn.classList.remove('active'); }
    else { modalExtras.push(idx); btn.classList.add('active'); }
    var itemId = parseInt(document.querySelector('.modal-add-btn').dataset.item);
    updateModalPrice(itemId);
}
function updateModalPrice(itemId) {
    var item = C.menuItems.find(function(i){ return i.id === itemId; });
    var price = item.price;
    modalExtras.forEach(function(i){ price += C.addOns[i].price; });
    document.querySelector('.modal-add-btn').textContent = 'Book Now — ' + C.currencySymbol + price.toFixed(2);
}

function quickAdd(id, event) {
    var item = C.menuItems.find(function(i){ return i.id === id; });
    cart.push({ itemId:id, name:item.name, icon:item.icon, gradient:item.gradient, duration:item.duration, extras:[], qty:1, unitPrice:item.price });
    updateCartBadge();
    showToast(item.name + ' booked!');
    if(event) {
        var btn = event.currentTarget || event.target.closest('.add-btn');
        if(btn) { btn.classList.add('added'); setTimeout(function(){ btn.classList.remove('added'); }, 600); }
    }
}
function addFromModal(id) {
    var item = C.menuItems.find(function(i){ return i.id === id; });
    var unitPrice = item.price;
    var extraNames = [];
    modalExtras.forEach(function(i){ unitPrice += C.addOns[i].price; extraNames.push(C.addOns[i].name); });
    cart.push({ itemId:id, name:item.name, icon:item.icon, gradient:item.gradient, duration:item.duration, extras:extraNames, qty:1, unitPrice:unitPrice });
    updateCartBadge(); closeModal();
    showToast(item.name + ' booked!');
}
function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(function(){ t.classList.remove('show'); }, 1800);
}
function updateCartBadge() {
    var total = cart.reduce(function(s,i){ return s+i.qty; }, 0);
    var badge = document.getElementById('cart-badge');
    badge.style.display = total > 0 ? 'flex' : 'none';
    badge.textContent = total;
    badge.classList.remove('cart-bounce'); void badge.offsetWidth; badge.classList.add('cart-bounce');
}
function removeCartItem(idx) { cart.splice(idx,1); updateCartBadge(); renderCart(); }

function renderCart() {
    var el = document.getElementById('cart-content');
    if(cart.length === 0) {
        el.innerHTML = '<div class="cart-empty"><i class="fas fa-calendar"></i><p>No bookings yet</p><span>Browse services to book an appointment</span></div>';
        return;
    }
    var subtotal = cart.reduce(function(s,i){ return s + i.unitPrice*i.qty; }, 0);
    var tax = subtotal * C.taxRate, total = subtotal + tax;
    var html = '';
    cart.forEach(function(item, idx){
        html += '<div class="cart-item"><div class="cart-item-img" style="background:linear-gradient(135deg,'+item.gradient[0]+','+item.gradient[1]+')">' +
            '<i class="fas '+item.icon+'" style="color:rgba(255,255,255,0.85)"></i></div>' +
            '<div class="cart-item-info"><h4>'+item.name+'</h4><p><i class="fas fa-clock" style="font-size:10px"></i> '+item.duration+(item.extras.length ? ' · '+item.extras.join(', ') : '')+'</p></div>' +
            '<div class="cart-item-right"><div class="cart-item-price">'+C.currencySymbol+(item.unitPrice*item.qty).toFixed(2)+'</div>' +
            '<div class="cart-item-qty">' +
            '<button class="cart-qty-btn" onclick="removeCartItem('+idx+')" style="color:#ef4444;border-color:#fecaca"><i class="fas fa-trash-can" style="font-size:10px"></i></button></div></div></div>';
    });
    html += '<div class="order-summary"><div class="summary-row"><span>Subtotal</span><span>'+C.currencySymbol+subtotal.toFixed(2)+'</span></div>' +
        '<div class="summary-row"><span>Tax ('+Math.round(C.taxRate*100)+'%)</span><span>'+C.currencySymbol+tax.toFixed(2)+'</span></div>' +
        '<div class="summary-row total"><span>Total</span><span>'+C.currencySymbol+total.toFixed(2)+'</span></div></div>' +
        '<button class="apple-pay-btn" onclick="placeOrder()"><i class="fab fa-apple"></i> Pay</button>' +
        '<button class="place-order-btn" onclick="placeOrder()">Confirm Booking — '+C.currencySymbol+total.toFixed(2)+'</button>';
    el.innerHTML = html;
}

function placeOrder() {
    var d = new Date(); d.setDate(d.getDate() + Math.floor(1+Math.random()*5));
    var timeSlot = ['10:00 AM','11:30 AM','1:00 PM','2:30 PM','4:00 PM'][Math.floor(Math.random()*5)];
    document.getElementById('success-msg').innerHTML = 'Your appointment is confirmed!<br>'+d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})+' at '+timeSlot;
    document.getElementById('order-success').classList.add('show');
}
function closeSuccess() {
    document.getElementById('order-success').classList.remove('show');
    cart = []; updateCartBadge(); switchScreen('home');
}

function renderAccount() {
    var initials = C.founderName.split(' ').map(function(w){ return w[0]; }).join('').slice(0,2).toUpperCase();
    document.getElementById('account-content').innerHTML =
        '<div class="profile-card"><div class="profile-avatar">'+initials+'</div>' +
        '<h3 class="profile-name">'+C.founderName+'</h3><p class="profile-role">'+C.founderRole+' · '+C.storeName+'</p></div>' +
        '<div class="rewards-card"><p class="rewards-label">Rewards Balance</p>' +
        '<p class="rewards-points">'+C.loyaltyPoints.toLocaleString()+' <span class="rewards-unit">pts</span></p>' +
        '<div class="rewards-progress-wrap"><div class="rewards-progress-bar" style="width:'+C.loyaltyProgress+'%"></div></div>' +
        '<div class="rewards-next"><span>Next: '+C.loyaltyNextReward+'</span><span>'+C.loyaltyProgress+'%</span></div></div>' +
        '<div class="settings-group">' +
